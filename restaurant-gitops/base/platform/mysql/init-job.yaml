apiVersion: batch/v1
kind: Job
metadata:
  name: mysql-bootstrap
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mysql-bootstrap
          image: mysql:8.4
          command:
            - /bin/sh
            - -c
            - |
              until mysqladmin ping -hmysql -uroot -p"${MYSQL_PWD}" --silent; do
                echo "Waiting for MySQL..."
                sleep 5
              done
              mysql -hmysql -uroot -p"${MYSQL_PWD}" < /init/00-create-databases.sql
          env:
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password
          volumeMounts:
            - name: init-sql
              mountPath: /init
      volumes:
        - name: init-sql
          configMap:
            name: mysql-init-sql

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: menu-items
          uri: ${MENU_SERVICE_URL:http://menu-service:8080}
          predicates:
            - Path=/api/menu/**
        - id: order-api
          uri: ${ORDER_SERVICE_URL:http://order-service:8080}
          predicates:
            - Path=/api/orders/**
        - id: payment-api
          uri: ${PAYMENT_SERVICE_URL:http://payment-service:8080}
          predicates:
            - Path=/api/payments/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/restaurant-demo}
server:
  port: ${SERVER_PORT:${GATEWAY_PORT:8080}}
management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}

name: restaurant-app-ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  JAVA_VERSION: "17"
  REGISTRY: docker.io
  IMAGE_NAMESPACE: khcodenet1008
  GITOPS_REPOSITORY: khcodenet1008/restaurant-gitops
  GITOPS_BRANCH: main

jobs:
  test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway-service
          - menu-service
          - order-service
          - payment-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Run Maven tests
        run: mvn -pl services/${{ matrix.service }} -am test

  publish-images:
    name: Publish ${{ matrix.service }} image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway-service
          - menu-service
          - order-service
          - payment-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Validate release secrets
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}" || { echo "Missing DOCKERHUB_USERNAME secret"; exit 1; }
          test -n "${{ secrets.DOCKERHUB_TOKEN }}" || { echo "Missing DOCKERHUB_TOKEN secret"; exit 1; }

      - name: Build service package
        run: mvn -pl services/${{ matrix.service }} -am package -DskipTests

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.service }}:latest

  update-gitops:
    name: Update GitOps image tags
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: publish-images
    runs-on: ubuntu-latest
    steps:
      - name: Validate GitOps secret
        run: |
          test -n "${{ secrets.GITOPS_REPO_TOKEN }}" || { echo "Missing GITOPS_REPO_TOKEN secret"; exit 1; }

      - name: Check out GitOps repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPOSITORY }}
          ref: ${{ env.GITOPS_BRANCH }}
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: restaurant-gitops

      - name: Update deployment image tags
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          for service in gateway-service menu-service order-service payment-service; do
            file="restaurant-gitops/base/services/${service}/deployment.yaml"
            sed -i "s|image: .*${service}:.*|image: ${REGISTRY}/${IMAGE_NAMESPACE}/${service}:${IMAGE_TAG}|" "${file}"
          done

      - name: Commit and push GitOps changes
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd restaurant-gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "GitOps manifests already point to ${IMAGE_TAG}"
            exit 0
          fi
          git add base/services/*/deployment.yaml
          git commit -m "chore: update restaurant app images to ${IMAGE_TAG}"
          git push origin "${GITOPS_BRANCH}"

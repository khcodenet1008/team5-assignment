spring:
  application:
    name: menu-service
  datasource:
    url: ${MENU_DB_URL:jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MENU_DB_NAME:restaurant_menu}}
    username: ${MYSQL_USERNAME:restaurant_app}
    password: ${MYSQL_PASSWORD:change-me}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
server:
  port: ${SERVER_PORT:8080}
management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: payment-service
          image: docker.io/khcodenet1008/payment-service:dev
          envFrom:
            - configMapRef:
                name: payment-service-config
          ports:
            - containerPort: 8080
